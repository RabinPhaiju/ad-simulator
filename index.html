<!doctype html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PocketPandit AI</title>

    <!-- ── Tailwind CSS (CDN) ──────────────────────────────────────────────── -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script src="./tailwind-config.js"></script>

    <!-- ── Google Fonts ───────────────────────────────────────────────────── -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />

    <!-- ── Custom styles (split into focused files) ──────────────────────── -->
    <link rel="stylesheet" href="./styles/base.css" />
    <link rel="stylesheet" href="./styles/layout.css" />
    <link rel="stylesheet" href="./styles/editor.css" />
    <link rel="stylesheet" href="./styles/toggles.css" />
    <link rel="stylesheet" href="./styles/chat.css" />
    <link rel="stylesheet" href="./styles/animations.css" />
    <link rel="stylesheet" href="./styles/recorder.css" />

    <!-- html2canvas: renders a DOM element to a <canvas> (used by recorder.js) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- ── Dialog content (must load before app scripts) ────────────────── -->
    <script src="./js/dialogs.js"></script>
  </head>

  <body
    class="bg-background-light dark:bg-background-dark font-sans text-slate-900 dark:text-slate-100 h-screen overflow-hidden"
  >
    <!-- ════════════════════════════════════════════════════════════════════
         APP CONTAINER – full-screen flex row split into:
           Left  → mobile-view-wrapper (the phone preview)
           Right → editor-panel       (the content editor)
         ════════════════════════════════════════════════════════════════════ -->
    <div class="app-container">
      <!-- ══════════════════════════════════════════════════════════════════
           LEFT PANE – Mobile phone preview
           ══════════════════════════════════════════════════════════════════ -->
      <div class="mobile-view-wrapper">
        <main
          class="flex-1 flex flex-col items-center px-2 pt-4 pb-2 max-w-[380px] mx-auto w-full overflow-hidden"
        >
          <!-- ── Page heading ─────────────────────────────────────────────── -->
          <h1
            class="font-display text-4xl md:text-5xl text-center leading-tight mb-3 flex-shrink-0"
          >
            <span class="block text-slate-900 dark:text-white" id="page-title"
              >Will I get</span
            >
            <span class="block text-primary" id="page-subtitle"
              >Australian visa?</span
            >
          </h1>

          <!-- ── Chat container (rounded phone card) ─────────────────────── -->
          <div
            class="chat-container w-full bg-white dark:bg-slate-800 rounded-[32px] border-4 border-primary/20 shadow-xl flex-1 flex flex-col overflow-hidden mb-2"
          >
            <!-- ── App header row (logo / credits / notifications) ──────── -->
            <div
              class="flex items-center justify-between px-4 pt-0 pb-0 border-b border-slate-100 dark:border-slate-700 flex-shrink-0"
            >
              <!-- Logo -->
              <img
                src="./banner_logo.png"
                alt="Pocket Pandit"
                class="h-14 p-1 w-auto object-contain"
              />

              <!-- Credits pill -->
              <div
                class="flex items-center bg-slate-200 dark:bg-slate-700 rounded-full px-2 py-1.5 space-x-2"
              >
                <div
                  class="w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 shadow"
                >
                  <!-- Coin / credit icon SVG -->
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    viewBox="0 0 25 25"
                    fill="none"
                  >
                    <rect
                      x="0.5"
                      y="0.563965"
                      width="24"
                      height="24"
                      rx="12"
                      fill="#F2994A"
                    ></rect>
                    <path
                      fill-rule="evenodd"
                      clip-rule="evenodd"
                      d="M17.0262 7.30199H13.6135V10.7147H17.0262V7.30199ZM12.1152 5.80371V12.213H18.5245V5.80371H12.1152Z"
                      fill="black"
                    ></path>
                    <path
                      fill-rule="evenodd"
                      clip-rule="evenodd"
                      d="M11.3856 12.0232H7.97289V15.4359H11.3856V12.0232ZM6.47461 10.5249V16.9342H12.8839V10.5249H6.47461Z"
                      fill="black"
                    ></path>
                    <path
                      d="M6.47461 15.5811H7.89721V19.3243H6.47461V15.5811Z"
                      fill="black"
                    ></path>
                  </svg>
                </div>
                <div class="flex flex-col leading-none">
                  <span
                    id="credits-value"
                    class="font-bold text-xs text-slate-900 dark:text-white tracking-tight"
                    >2.0</span
                  >
                  <span
                    class="text-[8px] font-semibold text-slate-500 dark:text-slate-400 tracking-widest uppercase"
                    >Credits</span
                  >
                </div>
                <span class="text-slate-500 font-bold text-sm leading-none"
                  >+</span
                >
              </div>

              <!-- Bell + Avatar -->
              <div class="flex items-center space-x-2.5">
                <div class="relative">
                  <span class="material-symbols-rounded text-slate-500 text-2xl"
                    >notifications</span
                  >
                </div>
                <div
                  class="w-8 h-8 rounded-full bg-slate-300 border-2 border-slate-400 overflow-hidden flex items-center justify-center"
                >
                  <img
                    alt="User profile"
                    class="w-full h-full object-cover"
                    src="./person.avif"
                  />
                </div>
              </div>
            </div>
            <!-- /app header row -->

            <!-- ── Messages list (scrollable) ─────────────────────────────── -->
            <!--
              Each message row has a semantic class:
                .user-msg-row  → a user message bubble
                .ai-msg-row    → an AI message bubble
              These are targeted by the AI Position toggle CSS in toggles.css.
            -->
            <div
              id="messages-list"
              class="flex-1 py-2 px-3 space-y-3 overflow-y-auto"
            >
              <!-- ── User message 1 ────────────────────────────────────── -->
              <div
                id="user-msg-1-block"
                class="user-msg-row flex items-start space-x-3"
              >
                <div
                  class="w-10 h-10 rounded-full overflow-hidden flex-shrink-0 border border-slate-200"
                >
                  <img
                    alt="User profile"
                    class="w-full h-full object-cover"
                    src="./person.avif"
                  />
                </div>
                <div class="space-y-2 max-w-[80%]">
                  <div
                    class="bg-user-bubble p-2 px-4 rounded-chat rounded-tl-none shadow-sm flex items-center space-x-1"
                  >
                    <p
                      id="user-msg-1"
                      class="text-[15px] leading-relaxed text-white"
                    ></p>
                  </div>
                </div>
              </div>

              <!-- ── User message 2: birth details ─────────────────────── -->
              <div
                id="birth-block"
                class="user-msg-row flex items-start space-x-3"
              >
                <div
                  class="w-10 h-10 rounded-full overflow-hidden flex-shrink-0 border border-slate-200"
                >
                  <img
                    alt="User profile"
                    class="w-full h-full object-cover"
                    src="./person.avif"
                  />
                </div>
                <div class="space-y-2 max-w-[80%]">
                  <div
                    class="bg-user-bubble p-2 px-4 rounded-chat rounded-tl-none shadow-sm"
                  >
                    <p
                      class="text-[15px] leading-relaxed text-white font-medium"
                    >
                      <span id="user-birthdate"></span><br />
                      <span id="user-birthplace"></span>
                    </p>
                  </div>
                </div>
              </div>

              <!-- ── AI response 1 (typed animation) ───────────────────── -->
              <!--
                pl-3 provides left-padding gap between avatar and bubble.
                When AI position is toggled, CSS swaps it to pr-3 (see toggles.css).
              -->
              <div class="ai-msg-row flex items-start pl-3">
                <div class="flex-1">
                  <div
                    class="bg-ai-bubble text-slate-800 p-2 px-2 rounded-chat rounded-tr-none shadow-lg"
                  >
                    <!-- Chart image (toggle-chart hides/shows this) -->
                    <div id="chart-block" class="mb-2 overflow-hidden">
                      <img
                        src="./chart.png"
                        alt="Astrological Chart"
                        class="w-full h-auto object-cover"
                      />
                    </div>
                    <!-- Typing target: words are inserted before the cursor span -->
                    <p
                      id="typing-response"
                      class="text-[15px] leading-relaxed font-medium"
                    >
                      <span class="typing-cursor" id="typing-cursor"></span>
                    </p>
                  </div>
                </div>
                <!-- AI avatar -->
                <div
                  class="w-10 h-10 rounded-full overflow-hidden flex-shrink-0 border border-slate-200 flex items-center justify-center"
                >
                  <img
                    alt="AI profile"
                    class="w-10 h-10 object-contain mix-blend-multiply"
                    src="./logo.png"
                  />
                </div>
              </div>

              <!-- ── User follow-up bubble (fades in after AI response 1) ─ -->
              <div
                id="follow-up-block"
                class="user-msg-row flex items-start space-x-3 opacity-0"
                style="transition: opacity 0.5s ease"
              >
                <div
                  class="w-10 h-10 rounded-full overflow-hidden flex-shrink-0 border border-slate-200"
                >
                  <img
                    alt="User profile"
                    class="w-full h-full object-cover"
                    src="./person.avif"
                  />
                </div>
                <div class="space-y-2 max-w-[80%]">
                  <div
                    class="bg-user-bubble p-2 px-4 rounded-chat rounded-tl-none shadow-sm flex items-center space-x-1"
                  >
                    <p
                      class="text-[15px] leading-relaxed text-white"
                      id="user-msg-2"
                    ></p>
                  </div>
                </div>
              </div>

              <!-- ── AI response 2 (fades in after follow-up, then typed) ─ -->
              <div
                id="ai-response-2-block"
                class="ai-msg-row flex items-start opacity-0 pl-3"
                style="transition: opacity 0.5s ease"
              >
                <div class="flex-1">
                  <div
                    class="bg-ai-bubble text-slate-800 p-2 px-2 rounded-chat rounded-tr-none shadow-lg"
                  >
                    <p
                      id="typing-response-2"
                      class="text-[15px] leading-relaxed font-medium"
                    >
                      <span class="typing-cursor" id="typing-cursor-2"></span>
                    </p>
                  </div>
                </div>
                <!-- AI avatar -->
                <div
                  class="w-10 h-10 rounded-full overflow-hidden flex-shrink-0 border border-slate-200 flex items-center justify-center"
                >
                  <img
                    alt="AI profile"
                    class="w-10 h-10 object-contain mix-blend-multiply"
                    src="./logo.png"
                  />
                </div>
              </div>
            </div>
            <!-- /messages-list -->

            <!-- ── Sticky chat input bar ───────────────────────────────── -->
            <div class="px-1 pb-2 pt-1 flex-shrink-0">
              <div class="relative flex items-center">
                <input
                  type="text"
                  id="chat-input-field"
                  placeholder=""
                  class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-full py-3 pl-2 pr-8 text-[12px] focus:outline-none focus:border-primary/50 transition-colors placeholder:text-slate-400 dark:placeholder:text-slate-500"
                />
                <!-- Send button -->
                <button
                  class="absolute right-2 p-2 text-slate-400 hover:text-primary transition-colors"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                  </svg>
                </button>
              </div>
            </div>
            <!-- /chat input bar -->
          </div>
          <!-- /chat-container -->

          <!-- ── CTA button (below the phone card) ──────────────────────── -->
          <button
            id="cta-button"
            class="w-full bg-primary hover:bg-opacity-90 active:scale-95 transition-all text-white font-bold py-3 rounded-full text-base shadow-lg"
          ></button>
        </main>
      </div>
      <!-- /mobile-view-wrapper -->

      <!-- ══════════════════════════════════════════════════════════════════
           RIGHT PANE – Content editor panel
           ══════════════════════════════════════════════════════════════════ -->
      <aside class="editor-panel">
        <div
          style="
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
          "
        >
          <h2 class="editor-title" style="margin: 0">Content Editor</h2>
          <!-- ── Record / Stop buttons ──────────────────────────────────── -->
          <div class="record-btn-row">
            <button
              id="btn-record"
              class="btn-record"
              title="Record mobile preview"
            >
              <span class="rec-dot"></span> Record
            </button>
            <button id="btn-stop" class="btn-stop" title="Stop recording">
              <span
                class="rec-dot"
                style="animation: pulse-rec 1s ease-in-out infinite"
              ></span>
              ⏹ <span id="stop-timer-text">00:00</span>
            </button>
          </div>
        </div>
        <p class="text-slate-500 -mt-4 text-sm">
          Edit the text below to see live updates in the mobile view.
        </p>

        <!-- ── AI Response Position toggle ─────────────────────────────── -->
        <!--
          Checked  = AI on LEFT  (default)
          Unchecked = AI on RIGHT
          JS in editor.js applies/removes .ai-on-left on #messages-list.
        -->
        <div class="toggle-row">
          <label class="toggle-label">AI Response Position</label>
          <div class="toggle-container">
            <span class="toggle-option" id="toggle-label-right">Right</span>
            <label class="toggle-switch">
              <input type="checkbox" id="ai-position-toggle" checked />
              <span class="toggle-slider"></span>
            </label>
            <span class="toggle-option" id="toggle-label-left">Left</span>
          </div>
        </div>

        <!-- ── Visibility toggles ──────────────────────────────────────── -->
        <!--
          Each toggle calls bindVisibilityToggle() in editor.js
          to show/hide the associated element.
        -->
        <div class="toggle-row">
          <label class="toggle-label">Show / Hide</label>

          <div class="flex items-center justify-between">
            <span class="text-xs text-slate-500">Chart Image</span>
            <label class="toggle-switch">
              <input type="checkbox" id="toggle-chart" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>

          <div class="flex items-center justify-between">
            <span class="text-xs text-slate-500">CTA Button</span>
            <label class="toggle-switch">
              <input type="checkbox" id="toggle-cta" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>

          <div class="flex items-center justify-between">
            <span class="text-xs text-slate-500">Birth Details</span>
            <label class="toggle-switch">
              <input type="checkbox" id="toggle-birth" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>

          <div class="flex items-center justify-between">
            <span class="text-xs text-slate-500">User Message 1</span>
            <label class="toggle-switch">
              <input type="checkbox" id="toggle-user-msg-1" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>

          <div class="flex items-center justify-between">
            <span class="text-xs text-slate-500"
              >Turn 2 (Follow-up + AI reply)</span
            >
            <label class="toggle-switch">
              <input type="checkbox" id="toggle-turn-2" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>

        <hr class="border-slate-200" />

        <!-- ── Page content fields ─────────────────────────────────────── -->
        <div class="editor-field">
          <label>Page Title</label>
          <input
            type="text"
            data-dialog="PAGE_TITLE"
            placeholder="Will I get"
          />
        </div>
        <div class="editor-field">
          <label>Page Subtitle</label>
          <input
            type="text"
            data-dialog="PAGE_SUBTITLE"
            placeholder="Australian visa?"
          />
        </div>
        <div class="editor-field">
          <label>CTA Button</label>
          <input
            type="text"
            data-dialog="CTA_BUTTON"
            placeholder="First few questions are free."
          />
        </div>
        <div class="editor-field">
          <label>Input Placeholder</label>
          <input
            type="text"
            data-dialog="INPUT_PLACEHOLDER"
            placeholder="Ask anything astrological..."
          />
        </div>

        <hr class="border-slate-200" />

        <!-- ── User conversation fields ───────────────────────────────── -->
        <div class="editor-field">
          <label>User Message 1</label>
          <textarea data-dialog="USER_MSG_1" rows="2"></textarea>
        </div>
        <div class="editor-field">
          <label>Birth Date</label>
          <input type="text" data-dialog="USER_BIRTHDATE" />
        </div>
        <div class="editor-field">
          <label>Birth Place</label>
          <input type="text" data-dialog="USER_BIRTHPLACE" />
        </div>

        <hr class="border-slate-200" />

        <!-- ── AI response fields ─────────────────────────────────────── -->
        <div class="editor-field">
          <label>AI Response 1 (Typing Animation)</label>
          <textarea data-dialog="AI_RESPONSE_1" rows="5"></textarea>
        </div>
        <div class="editor-field">
          <label>User Message 2 (Follow-up)</label>
          <textarea data-dialog="USER_MSG_2" rows="2"></textarea>
        </div>
        <div class="editor-field">
          <label>AI Response 2 (Typing Animation)</label>
          <textarea data-dialog="AI_RESPONSE_2" rows="5"></textarea>
        </div>

        <!-- ── Restart animation button ───────────────────────────────── -->
        <div
          id="restart-animation"
          class="restart-btn flex items-center justify-center gap-2"
        >
          <span class="material-symbols-rounded">replay</span>
          Restart Animation
        </div>
      </aside>
      <!-- /editor-panel -->
    </div>
    <!-- /app-container -->

    <!-- ════════════════════════════════════════════════════════════════════
         SCRIPTS – Load order matters:
           1. config.js      → CONFIG constants
           2. dialogs.js     → DIALOGS text content  (already in <head>)
           3. dom-helpers.js → setText, fadeIn
           4. scroll.js      → userScrolledUp, scrollChat
           5. typing.js      → typeWords  (needs CONFIG + scrollChat)
           6. editor.js      → initEditor (needs DIALOGS + setText)
           7. app.js         → entry point, calls everything above
         ════════════════════════════════════════════════════════════════════ -->
    <script src="./js/config.js"></script>
    <script src="./js/dom-helpers.js"></script>
    <script src="./js/scroll.js"></script>
    <script src="./js/typing.js"></script>
    <script src="./js/editor.js"></script>
    <script src="./js/app.js"></script>
    <script src="./js/recorder.js"></script>
  </body>
</html>
