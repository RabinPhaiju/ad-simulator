<!doctype html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PocketPandit AI</title>

    <!-- Tailwind CSS (CDN) + custom config -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script src="./tailwind-config.js"></script>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Playfair+Display:wght@700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />

    <!-- Custom styles -->
    <link rel="stylesheet" href="./styles.css" />

    <!-- Dialog content (must load before app.js) -->
    <script src="./dailogs.js"></script>
  </head>

  <body
    class="bg-background-light dark:bg-background-dark font-sans text-slate-900 dark:text-slate-100 h-screen flex flex-col overflow-hidden"
  >
    <main
      class="flex-1 flex flex-col items-center px-2 pt-4 pb-2 max-w-[380px] mx-auto w-full overflow-hidden"
    >
      <!-- Page heading -->
      <h1
        class="font-display text-4xl md:text-5xl text-center leading-tight mb-3 flex-shrink-0"
      >
        <span class="block text-slate-900 dark:text-white" id="page-title"
          >Will I get</span
        >
        <span class="block text-primary" id="page-subtitle"
          >Australian visa?</span
        >
      </h1>

      <div
        class="w-full bg-white dark:bg-slate-800 rounded-[32px] border-4 border-primary/20 shadow-xl flex-1 flex flex-col overflow-hidden mb-4"
      >
        <!-- App header row -->
        <div
          class="flex items-center justify-between px-4 pt-0 pb-0 border-b border-slate-100 dark:border-slate-700 flex-shrink-0"
        >
          <!-- Left: Logo -->
          <img
            src="./banner_logo.png"
            alt="Pocket Pandit"
            class="h-14 p-1 w-auto object-contain"
          />

          <!-- Center: Credits pill -->
          <div
            class="flex items-center bg-slate-200 dark:bg-slate-700 rounded-full px-2 py-1.5 space-x-2"
          >
            <div
              class="w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 shadow"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                viewBox="0 0 25 25"
                fill="none"
              >
                <rect
                  x="0.5"
                  y="0.563965"
                  width="24"
                  height="24"
                  rx="12"
                  fill="#F2994A"
                ></rect>
                <path
                  fill-rule="evenodd"
                  clip-rule="evenodd"
                  d="M17.0262 7.30199H13.6135V10.7147H17.0262V7.30199ZM12.1152 5.80371V12.213H18.5245V5.80371H12.1152Z"
                  fill="black"
                ></path>
                <path
                  fill-rule="evenodd"
                  clip-rule="evenodd"
                  d="M11.3856 12.0232H7.97289V15.4359H11.3856V12.0232ZM6.47461 10.5249V16.9342H12.8839V10.5249H6.47461Z"
                  fill="black"
                ></path>
                <path
                  d="M6.47461 15.5811H7.89721V19.3243H6.47461V15.5811Z"
                  fill="black"
                ></path>
              </svg>
            </div>
            <div class="flex flex-col leading-none">
              <span
                class="font-bold text-sm text-slate-900 dark:text-white tracking-tight"
                >2.0</span
              >
              <span
                class="text-[8px] font-semibold text-slate-500 dark:text-slate-400 tracking-widest uppercase"
                >Credits</span
              >
            </div>
            <span class="text-slate-500 font-bold text-base leading-none"
              >+</span
            >
          </div>

          <!-- Right: Bell + Avatar -->
          <div class="flex items-center space-x-2.5">
            <div class="relative">
              <span class="material-symbols-rounded text-slate-500 text-2xl"
                >notifications</span
              >
            </div>
            <div
              class="w-8 h-8 rounded-full bg-slate-300 border-2 border-slate-400 overflow-hidden flex items-center justify-center"
            >
              <img
                alt="User profile"
                class="w-full h-full object-cover"
                src="./person.avif"
              />
            </div>
          </div>
        </div>

        <!-- Chat messages area -->
        <div
          id="messages-list"
          class="flex-1 py-2 px-3 space-y-3 overflow-y-auto"
        >
          <!-- User message 1 -->
          <div class="flex items-start space-x-3">
            <div
              class="w-10 h-10 rounded-full overflow-hidden flex-shrink-0 border border-slate-200"
            >
              <img
                alt="User profile"
                class="w-full h-full object-cover"
                src="./person.avif"
              />
            </div>
            <div class="space-y-2 max-w-[80%]">
              <div
                class="bg-bubble-beige dark:bg-slate-700 p-3 px-4 rounded-chat rounded-tl-none shadow-sm flex items-center space-x-1"
              >
                <p
                  class="text-[15px] leading-relaxed text-slate-700 dark:text-slate-200"
                >
                  मेरो अष्ट्रेलियन भिसा कहिले लाग्छ? 😭
                </p>
              </div>
            </div>
          </div>

          <!-- User message: birth details -->
          <div class="flex items-start space-x-3">
            <div
              class="w-10 h-10 rounded-full overflow-hidden flex-shrink-0 border border-slate-200"
            >
              <img
                alt="User profile"
                class="w-full h-full object-cover"
                src="./person.avif"
              />
            </div>
            <div class="space-y-2 max-w-[80%]">
              <div
                class="bg-bubble-beige dark:bg-slate-700 p-3 px-4 rounded-chat rounded-tl-none shadow-sm"
              >
                <p
                  class="text-[15px] leading-relaxed text-slate-700 dark:text-slate-200 font-medium"
                >
                  January 12, 2006, 10am<br />
                  Kathmandu, Nepal
                </p>
              </div>
            </div>
          </div>

          <!-- AI response 1 (typed) -->
          <div class="flex items-start space-x-2">
            <div class="flex-1 pl-3">
              <div
                class="bg-primary text-white p-4 px-2 rounded-chat rounded-tr-none shadow-lg"
              >
                <p
                  id="typing-response"
                  class="text-[15px] leading-relaxed font-medium"
                >
                  <span class="typing-cursor" id="typing-cursor"></span>
                </p>
              </div>
            </div>
            <div
              class="w-10 h-10 rounded-full overflow-hidden flex-shrink-0 border border-slate-200 flex items-center justify-center"
            >
              <img
                alt="AI profile"
                class="w-10 h-10 object-contain mix-blend-multiply"
                src="./logo.png"
              />
            </div>
          </div>

          <!-- User follow-up (fades in after AI response 1) -->
          <div
            id="follow-up-block"
            class="flex items-start space-x-3 opacity-0"
            style="transition: opacity 0.5s ease"
          >
            <div
              class="w-10 h-10 rounded-full overflow-hidden flex-shrink-0 border border-slate-200"
            >
              <img
                alt="User profile"
                class="w-full h-full object-cover"
                src="https://img.freepik.com/free-photo/young-determined-armenian-curlyhaired-female-university-student-listen-carefully-asignment-look-confident-ready-task-cross-hands-chest-smiling-selfassured-standing-white-background_176420-56066.jpg?semt=ais_hybrid&w=740&q=80"
              />
            </div>
            <div class="space-y-2 max-w-[80%]">
              <div
                class="bg-bubble-beige dark:bg-slate-700 p-3 px-4 rounded-chat rounded-tl-none shadow-sm flex items-center space-x-1"
              >
                <p
                  class="text-[15px] leading-relaxed text-slate-700 dark:text-slate-200"
                  id="user-msg-2"
                ></p>
              </div>
            </div>
          </div>

          <!-- AI response 2 (typed, fades in after follow-up) -->
          <div
            id="ai-response-2-block"
            class="flex items-start space-x-3 opacity-0"
            style="transition: opacity 0.5s ease"
          >
            <div class="flex-1 pl-3">
              <div
                class="bg-primary text-white p-2 px-2 rounded-chat rounded-tr-none shadow-lg"
              >
                <p
                  id="typing-response-2"
                  class="text-[15px] leading-relaxed font-medium"
                >
                  <span class="typing-cursor" id="typing-cursor-2"></span>
                </p>
              </div>
            </div>
            <div
              class="w-10 h-10 rounded-full overflow-hidden flex-shrink-0 border border-slate-200 flex items-center justify-center"
            >
              <img
                alt="AI profile"
                class="w-10 h-10 object-contain mix-blend-multiply"
                src="./logo.png"
              />
            </div>
          </div>
        </div>
      </div>

      <div class="w-full flex items-center justify-between px-2"></div>
      <button
        id="cta-button"
        class="w-full bg-primary hover:bg-opacity-90 active:scale-95 transition-all text-white font-bold py-4 rounded-full text-lg shadow-lg"
      ></button>
    </main>

    <!-- Application logic (must load after DOM is ready) -->
    <script src="./app.js"></script>
  </body>
</html>
